schema: spec-driven
context: |
  Project Architecture Constraints:
  - core-engine: Execution runtime in pure TypeScript. MUST remain host-agnostic.
    No DOM, Browser, Node.js filesystem, Photoshop, or UXP APIs in shared execution code.
  - providers: API mapping plus schema validation. Providers own parameter semantics,
    remote invocation behavior, and response mapping.
  - workflows: Declarative execution specs only. No embedded host callbacks, hidden IO,
    or executable business logic inside workflow definitions.
  - adapters: The only layer allowed to touch IO, filesystem, network, or host APIs.
  - apps/*: UI and host integration only. Hosts assemble job requests and surface results,
    but must not reimplement engine or provider semantics.
rules:
  proposal:
    - Keep capability boundaries explicit and note prerequisite relationships for foundation changes.
    - Prefer architectural impact over implementation-library detail.
  design:
    - Define shared contracts, failure taxonomy, and cross-capability invariants before host-specific detail.
    - Resolve foundation-blocking open questions when downstream contracts depend on them.
  specs:
    - Write observable behavior contracts with SHALL requirements and concrete scenarios.
    - Do not restate design rationale in specs unless it changes externally observable behavior.
    - Never add host-specific dependencies or parameter semantics to core-engine or workflow specs.
    - Base64 and host-native objects may appear only at adapter boundaries, never as shared runtime contracts.
  tasks:
    - Break work by architecture layer and include contract verification tasks for each capability.
    - Call out boundary enforcement and host failure-path testing when hosts are involved.
