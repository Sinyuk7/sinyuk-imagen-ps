schema: spec-driven

context: |
  Tech stack: TypeScript, React 19, Node.js, pnpm, Turbo, Vitest
  Platform: Photoshop UXP plugin monorepo

  Packages:
    - app/: host/app layer only
    - packages/core-engine: host-agnostic runtime only
    - packages/providers: provider semantics, validation, and API mapping only
    - packages/workflows: declarative workflow specs only

  Architecture constraints:
    - Do not move UI, FS, network, or provider lifecycle logic into core-engine
    - Keep dependency direction clear between app, engine, providers, and workflows
    - Treat early code structure as tentative when it conflicts with documented intent

  Documentation priority:
    - AGENTS.md
    - PRD and design docs
    - README and module docs
    - code

  Writing style:
    - Write in Chinese by default
    - Keep technical terms, code, and file paths in English

rules:
  proposal:
    - Keep it concise and within current single-app scope
    - Always include Non-goals
    - Do not expand into future web app or multi-host scope

  design:
    - Record decisions, boundaries, and trade-offs
    - Do not present future ideas or directory sketches as existing facts

  tasks:
    - Break work into small chunks, ideally within 2 hours each
    - Prefer module-local changes first
    - Cross-module changes must respect dependency direction

  specs:
    - Prefer explicit boundaries and observable behavior
    - Reference existing patterns before introducing new ones